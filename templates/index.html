<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini ATS Kanban Board</title>
    <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>

    <header>
        <h1>Student Recruitment Tracker (Mini ATS)</h1>
    </header>

    <div class="board">
        <div class="column" data-stage="Applied" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>Applied</h2>
            <div class="card-container" id="Applied"></div>
        </div>

        <div class="column" data-stage="Interviewing" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>Interviewing</h2>
            <div class="card-container" id="Interviewing"></div>
        </div>

        <div class="column" data-stage="Technical Test" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>Technical Test</h2>
            <div class="card-container" id="Technical Test"></div>
        </div>

        <div class="column" data-stage="Offered" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>Offered</h2>
            <div class="card-container" id="Offered"></div>
        </div>

        <div class="column" data-stage="Rejected" ondragover="allowDrop(event)" ondrop="drop(event)">
            <h2>Rejected</h2>
            <div class="card-container" id="Rejected"></div>
        </div>
    </div>

    <!-- Score Input Modal -->
    <div id="scoreModalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3 id="scoreModalTitle">Enter Score</h3>
            <p id="scoreModalDescription"></p>
            <input type="number" id="scoreModalInput" min="0" max="100" placeholder="0 - 100">
            <p id="scoreModalError" class="modal-error"></p>
            <div class="modal-actions">
                <button id="scoreModalCancel" class="modal-btn modal-btn-secondary">Cancel</button>
                <button id="scoreModalSubmit" class="modal-btn modal-btn-primary">Submit</button>
            </div>
        </div>
    </div>

    <!-- Error Modal (blocked actions) -->
    <div id="errorModalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal-card modal-card-error">
            <h3 id="errorModalTitle">Action Not Allowed</h3>
            <p id="errorModalMessage"></p>
            <div class="modal-actions">
                <button id="errorModalClose" class="modal-btn modal-btn-primary">OK</button>
            </div>
        </div>
    </div>

    <!-- Rejection Modal (candidate auto-rejected) -->
    <div id="rejectionModalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal-card modal-card-rejection">
            <h3 id="rejectionModalTitle">Candidate Rejected</h3>
            <p id="rejectionModalMessage"></p>
            <div class="modal-actions">
                <button id="rejectionModalClose" class="modal-btn modal-btn-primary">OK</button>
            </div>
        </div>
    </div>

    <!-- Candidate Detail Modal -->
    <div id="detailModalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3 id="detailModalName">Candidate Details</h3>
            <div id="detailModalBody" class="detail-body"></div>
            <div class="modal-actions">
                <button id="detailModalClose" class="modal-btn modal-btn-primary">Close</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js?v=5"></script>
</body>
</html>
